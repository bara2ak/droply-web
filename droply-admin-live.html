<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Droply — Admin (Live)</title>
<link rel="icon" type="image/png" href="droply-logo.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="droply-config.js"></script>
<style>
  :root{--brand:#2563eb;--brand-dark:#1d4ed8;--brand-soft:#eff4ff;--ink:#0f172a;--muted:#64748b;
    --line:#e5e9f0;--bg:#f1f5f9;--card:#fff;--green:#16a34a;--green-soft:#e9f9ef;--amber:#d97706;
    --amber-soft:#fdf3e7;--red:#dc2626;--red-soft:#fee2e2;--violet:#6d28d9}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
  a{cursor:pointer}
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#1e3a8a,#2563eb 60%,#3b82f6);padding:20px}
  .login .box{background:#fff;border-radius:20px;padding:36px 32px;width:370px;box-shadow:0 30px 70px rgba(0,0,0,.3)}
  .brand{display:flex;align-items:center;gap:10px;font-size:24px;font-weight:800;letter-spacing:-.5px}
  .brand .dot{width:40px;height:34px;background:url('droply-logo.png') center/contain no-repeat}
  .tag{color:var(--muted);font-size:13px;margin:2px 0 20px}
  label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.4px}
  input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:#fff}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand)}
  .btn{padding:11px 16px;border:none;border-radius:10px;font-size:14px;font-weight:700;background:var(--brand);color:#fff;cursor:pointer}
  .btn:hover{background:var(--brand-dark)} .btn.full{width:100%;padding:13px;margin-top:20px}
  .btn.sm{padding:7px 12px;font-size:13px;border-radius:8px}
  .hint{font-size:12px;color:var(--muted);text-align:center;margin-top:14px}
  .app{display:none;min-height:100vh}
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:#0f172a;color:#cbd5e1;padding:22px 14px;display:flex;flex-direction:column}
  .sidebar .brand{color:#fff;font-size:20px;padding:0 8px 18px}
  .sidebar .brand .dot{width:34px;height:28px}
  .sidebar nav a{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;color:#cbd5e1;font-weight:600;margin-bottom:3px}
  .sidebar nav a:hover{background:#1e293b;color:#fff}.sidebar nav a.on{background:var(--brand);color:#fff}
  .sidebar nav a .badge{margin-left:auto;background:var(--amber);color:#fff;font-size:11px;font-weight:800;padding:1px 7px;border-radius:20px}
  .sidebar .foot{margin-top:auto;border-top:1px solid #1e293b;padding-top:14px;font-size:12px;color:#94a3b8}
  .sidebar .foot a:hover{color:#fff}
  .main{margin-left:220px;padding:26px 30px}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .head h1{font-size:22px;margin:0}.head .sub{color:var(--muted);font-size:13px;margin-top:3px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .ph{padding:14px 18px;border-bottom:1px solid var(--line);font-weight:700}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;padding:11px 16px;background:#f8fafc;border-bottom:1px solid var(--line)}
  td{padding:12px 16px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none} tr:hover{background:#f8fafc}
  .u .nm{font-weight:700}.u .em{font-size:12px;color:var(--muted)}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}
  .p-verified{background:var(--green-soft);color:var(--green)}
  .p-pending{background:var(--amber-soft);color:var(--amber)}
  .p-suspended{background:var(--red-soft);color:var(--red)}
  .mini{font-size:12.5px;font-weight:700;padding:5px 10px;border-radius:8px;border:1.5px solid var(--line);background:#fff;cursor:pointer;color:var(--ink);margin-right:5px}
  .mini.g{border-color:#bbf7d0;color:var(--green)}.mini.r{border-color:#fecaca;color:var(--red)}.mini.b{border-color:#bfdbfe;color:var(--brand-dark)}
  td select{padding:6px 9px;border-radius:8px;font-size:13px;width:auto}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}
  .kpi .l{color:var(--muted);font-size:12.5px;font-weight:600}.kpi .v{font-size:26px;font-weight:800;margin-top:6px}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 20px;border-radius:24px;font-size:13.5px;font-weight:600;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
  .pill.p-role{background:#ede9fe;color:var(--violet)}
  .overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:16px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 30px 70px rgba(0,0,0,.35)}
  .modal .mh{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .modal .mh h3{margin:0;font-size:17px}
  .modal .mb{padding:20px}
  .modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
  .x{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn.outline{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
  .you{background:var(--brand-soft);color:var(--brand-dark);font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;margin-left:6px}
</style>
</head>
<body>
<div class="login" id="login">
  <div class="box">
    <div class="brand"><span class="dot"></span>Droply</div>
    <div class="tag">Admin — connected to Supabase</div>
    <label>Email</label><input id="l_email" type="email" placeholder="admin@…">
    <label>Password</label><input id="l_pass" type="password" placeholder="••••••">
    <button class="btn full" onclick="login()">Sign in</button>
    <div class="hint" id="l_hint">Use the admin account you created in Supabase.</div>
  </div>
</div>

<div class="app" id="app">
  <aside class="sidebar">
    <div class="brand"><span class="dot"></span>Droply</div>
    <nav id="nav"></nav>
    <div class="foot"><div id="whoami">admin</div><a onclick="logout()">← Sign out</a></div>
  </aside>
  <main class="main" id="main"></main>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
const sb = supabase.createClient(window.DROPLY_SUPABASE_URL, window.DROPLY_SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
const esc=s=>(s==null?'':String(s)).replace(/</g,'&lt;');
const jod=n=>(Math.round((n||0)*100)/100)+' JOD';
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

let route='dashboard';
let captains=[], customers=[], discounts=[], settlements=[], deliveries=[], staff=[];
const CITIES=['Amman','Zarqa','Irbid','Russeifa','Aqaba','Salt','Madaba','Mafraq','Jerash','Ajloun','Karak',"Ma'an",'Tafilah','Ramtha'];
const STAFF_ROLES={super_admin:'Super Admin',manager:'Manager',dispatcher:'Dispatcher',support:'Support',finance:'Finance'};

/* ---------- AUTH ---------- */
async function login(){
  const email=($('l_email').value||'').trim(), pass=$('l_pass').value||'';
  if(!email||!pass){toast('Enter email and password');return;}
  $('l_hint').textContent='Signing in…';
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){$('l_hint').textContent='Wrong email or password.';return;}
  const {data:isAdmin}=await sb.rpc('is_admin');
  if(!isAdmin){ $('l_hint').textContent='This account is not an admin.'; await sb.auth.signOut(); return; }
  const {data:me}=await sb.from('profiles').select('suspended').eq('id',(await sb.auth.getUser()).data.user.id).maybeSingle();
  if(me&&me.suspended){ $('l_hint').textContent='This account is suspended.'; await sb.auth.signOut(); return; }
  $('whoami').textContent=email;
  $('login').style.display='none'; $('app').style.display='block';
  await loadAll(); go('dashboard');
}
async function logout(){ await sb.auth.signOut(); location.reload(); }

async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session) return;
  const {data:isAdmin}=await sb.rpc('is_admin');
  if(isAdmin){ $('whoami').textContent=session.user.email; $('login').style.display='none'; $('app').style.display='block'; await loadAll(); go('dashboard'); }
}

/* ---------- DATA ---------- */
async function loadAll(){
  const [cap,cus,dis,set,del,stf] = await Promise.all([
    sb.from('captains').select('*, profiles(full_name,email,mobile,city,created_at)').order('created_at',{ascending:false}),
    sb.from('profiles').select('*').eq('role','customer').order('created_at',{ascending:false}),
    sb.from('discounts').select('*').order('id'),
    sb.from('settlements').select('*').order('created_at',{ascending:false}),
    sb.from('deliveries').select('*, delivery_bags(seq,recipient,address,mobile), customer:profiles(full_name,mobile), captains(plate,profiles(full_name))').order('created_at',{ascending:false}),
    sb.from('profiles').select('*').eq('role','admin').order('created_at',{ascending:false}),
  ]);
  captains=(cap.data||[]).map(c=>({id:c.id, name:c.profiles?.full_name||'—', email:c.profiles?.email||'',
    mobile:c.profiles?.mobile||'', city:c.profiles?.city||'', vehicle:c.vehicle, plate:c.plate,
    status:c.status, owed:Number(c.owed||0), earnings:Number(c.earnings||0),
    joined:c.profiles?.created_at||c.created_at,
    docs:{id:c.id_doc_url,license:c.license_url,record:c.record_url}}));
  customers=(cus.data||[]);
  discounts=(dis.data||[]);
  settlements=(set.data||[]);
  deliveries=(del.data||[]);
  staff=(stf.data||[]);
}

/* ---------- NAV ---------- */
function go(r){route=r;render();}
function render(){
  const pend=captains.filter(c=>c.status==='pending').length;
  const pendS=settlements.filter(s=>s.status==='pending').length;
  const items=[['dashboard','▤','Dashboard'],['captains','🚗','Captains',pend],['customers','🙂','Customers'],['deliveries','📦','Deliveries'],
    ['discounts','🏷️','Discounts'],['settlements','🏦','Settlements',pendS],['reports','📊','Reports'],['announce','📢','Announcements'],['team','👥','Team']];
  $('nav').innerHTML=items.map(([r,i,l,b])=>`<a class="${route===r?'on':''}" onclick="go('${r}')">${i} ${l}${b?`<span class="badge">${b}</span>`:''}</a>`).join('');
  const m=$('main');
  if(route==='dashboard') m.innerHTML=viewDashboard();
  else if(route==='captains') m.innerHTML=viewCaptains();
  else if(route==='customers') m.innerHTML=viewCustomers();
  else if(route==='deliveries') m.innerHTML=viewDeliveries();
  else if(route==='discounts') m.innerHTML=viewDiscounts();
  else if(route==='settlements') m.innerHTML=viewSettlements();
  else if(route==='reports') m.innerHTML=viewReports();
  else if(route==='announce') m.innerHTML=viewAnnounce();
  else if(route==='team') m.innerHTML=viewTeam();
}
function viewDashboard(){
  const kpi=(l,v,d)=>`<div class="kpi"><div class="l">${l}</div><div class="v">${v}</div>${d?`<div style="font-size:12px;color:var(--muted);margin-top:2px">${d}</div>`:''}</div>`;
  const rev=deliveries.filter(d=>d.status==='delivered').reduce((s,d)=>s+Number(d.price||0),0);
  return `<div class="head"><div><h1>Dashboard</h1><div class="sub">Overview of your operations</div></div>
    <button class="btn sm" onclick="reload()">↻ Refresh</button></div>
    <div class="kpis">
      ${kpi('🚗 Captains',captains.length,captains.filter(c=>c.status==='verified').length+' verified')}
      ${kpi('⏳ Pending approvals',captains.filter(c=>c.status==='pending').length,'Awaiting review')}
      ${kpi('🙂 Customers',customers.length,'Registered')}
      ${kpi('📦 Deliveries',deliveries.length,deliveries.filter(d=>d.status==='delivered').length+' delivered')}
    </div>
    <div class="kpis" style="grid-template-columns:repeat(3,1fr)">
      ${kpi('💰 Revenue',jod(rev),'From completed deliveries')}
      ${kpi('🏦 Pending settlements',settlements.filter(s=>s.status==='pending').length,'To review')}
      ${kpi('👥 Team members',staff.length,'Admins & staff')}
    </div>`;
}

/* ---------- CAPTAINS ---------- */
function capPill(s){return `<span class="pill p-${s}">${s.charAt(0).toUpperCase()+s.slice(1)}</span>`;}
function viewCaptains(){
  const rows=captains.map(c=>`<tr>
    <td><div class="u"><div class="nm">${esc(c.name)}</div><div class="em">${esc(c.email)}</div></div></td>
    <td>${esc(c.mobile)}</td><td>${esc(c.city)}</td><td>${esc(c.vehicle)} · ${esc(c.plate||'—')}</td>
    <td>${capPill(c.status)}</td><td>${c.owed>0?`<b style="color:var(--amber)">${jod(c.owed)}</b>`:'—'}</td>
    <td>
      ${c.status==='pending'?`<button class="mini g" onclick="setCaptain('${c.id}','verified')">Approve</button><button class="mini r" onclick="setCaptain('${c.id}','suspended')">Reject</button>`:''}
      ${c.status==='verified'?`<button class="mini r" onclick="setCaptain('${c.id}','suspended')">Suspend</button>`:''}
      ${c.status==='suspended'?`<button class="mini g" onclick="setCaptain('${c.id}','verified')">Reinstate</button>`:''}
      <button class="mini b" onclick="viewCaptain('${c.id}')">View</button>
      <button class="mini b" onclick="openCaptain('${c.id}')">Edit</button>
    </td></tr>`).join('') || `<tr><td class="empty" colspan="7">No captains yet. When someone signs up as a captain in the app, they appear here.</td></tr>`;
  return `<div class="head"><div><h1>Captains</h1><div class="sub">${captains.length} registered · ${captains.filter(c=>c.status==='pending').length} awaiting approval</div></div>
    <div style="display:flex;gap:8px"><button class="btn sm outline" onclick="reload()">↻ Refresh</button><button class="btn sm" onclick="openNewCaptain()">＋ Add captain</button></div></div>
    <div class="panel"><table><thead><tr><th>Captain</th><th>Mobile</th><th>City</th><th>Vehicle</th><th>Status</th><th>Owed</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
async function setCaptain(id,status){
  const {error}=await sb.from('captains').update({status}).eq('id',id);
  if(error){toast(error.message);return;}
  await loadAll(); render(); toast('Captain '+(status==='verified'?'approved':status));
}

/* ---------- CUSTOMERS ---------- */
function viewCustomers(){
  const rows=customers.map(c=>`<tr>
    <td><div class="u"><div class="nm">${esc(c.full_name)}</div><div class="em">${esc(c.email)}</div></div></td>
    <td>${esc(c.mobile||'—')}</td><td>${esc(c.city||'—')}</td>
    <td>${c.suspended?'<span class="pill p-suspended">Suspended</span>':'<span class="pill p-verified">Active</span>'}</td>
    <td>${new Date(c.created_at).toISOString().slice(0,10)}</td>
    <td>
      <button class="mini b" onclick="openCustomer('${c.id}')">Edit</button>
      <button class="mini ${c.suspended?'g':'r'}" onclick="toggleCustomerSuspend('${c.id}',${!c.suspended})">${c.suspended?'Unsuspend':'Suspend'}</button>
    </td></tr>`).join('')
    || `<tr><td class="empty" colspan="6">No customers yet.</td></tr>`;
  return `<div class="head"><div><h1>Customers</h1><div class="sub">${customers.length} registered · ${customers.filter(c=>c.suspended).length} suspended</div></div>
    <button class="btn sm" onclick="reload()">↻ Refresh</button></div>
    <div class="panel"><table><thead><tr><th>Customer</th><th>Mobile</th><th>City</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ---------- DELIVERIES ---------- */
function delRecipients(d){ return ((d.delivery_bags||[]).slice().sort((a,b)=>(a.seq||0)-(b.seq||0)).map(b=>b.recipient).filter(Boolean)); }
function viewDeliveries(){
  const rows=deliveries.map(d=>{
    const recips=delRecipients(d); const recTxt=recips.length? (recips[0]+(recips.length>1?' +'+(recips.length-1):'')):'—';
    const capName=d.captains&&d.captains.profiles?d.captains.profiles.full_name:'—';
    return `<tr>
      <td>#${d.id}</td>
      <td>${esc(d.customer?d.customer.full_name:'—')}</td>
      <td>${esc(recTxt)}</td>
      <td>${esc(d.from_city)} → ${esc(d.to_city)}</td>
      <td>${esc(capName)}</td>
      <td>${jod(d.price)}</td>
      <td><span class="pill p-${d.status==='delivered'?'verified':d.status==='cancelled'?'suspended':d.status==='pending'?'pending':'verified'}">${esc(d.status)}</span></td>
      <td><button class="mini b" onclick="openDelivery(${d.id})">Details</button></td></tr>`;
  }).join('') || `<tr><td class="empty" colspan="8">No deliveries yet.</td></tr>`;
  return `<div class="head"><div><h1>Deliveries</h1><div class="sub">${deliveries.length} total</div></div>
    <button class="btn sm" onclick="reload()">↻ Refresh</button></div>
    <div class="panel"><table><thead><tr><th>ID</th><th>Customer</th><th>Recipient</th><th>Route</th><th>Captain</th><th>Price</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function openDelivery(id){
  const d=deliveries.find(x=>x.id===id); if(!d)return;
  const bags=(d.delivery_bags||[]).slice().sort((a,b)=>(a.seq||0)-(b.seq||0));
  const capName=d.captains&&d.captains.profiles?d.captains.profiles.full_name:'—';
  const capPlate=d.captains?d.captains.plate||'':'';
  openModal(`<div class="mh"><h3>Delivery #${d.id}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      <div class="two">
        <div><div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase">Customer</div><b>${esc(d.customer?d.customer.full_name:'—')}</b><div style="font-size:12px;color:var(--muted)">${esc(d.customer?d.customer.mobile||'':'')}</div></div>
        <div><div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase">Captain</div><b>${esc(capName)}</b><div style="font-size:12px;color:var(--muted)">${esc(capPlate)}</div></div>
      </div>
      <div style="height:12px"></div>
      <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase">Pickup location</div>
      <div style="font-weight:600;margin-bottom:12px">${esc(d.pickup_addr||'—')}</div>
      <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase">Drop-off${bags.length>1?'s':''} (${bags.length})</div>
      ${bags.map((b,i)=>`<div style="padding:9px 0;border-bottom:1px solid var(--line)">
        <b>${bags.length>1?(i+1)+'. ':''}${esc(b.recipient)}</b>
        <div style="font-size:13px;color:var(--muted)">📍 ${esc(b.address||'—')}</div>
        <div style="font-size:13px;color:var(--muted)">📞 ${esc(b.mobile||'—')}</div></div>`).join('')||'<div style="color:var(--muted)">—</div>'}
      <div class="two" style="margin-top:14px">
        <div><div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase">Price</div><b>${jod(d.price)}</b> · ${d.payment_method==='cod'?'💵 Cash':'💳 Online'}</div>
        <div><div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase">Status</div><b>${esc(d.status)}</b></div>
      </div>
      ${d.notes?`<div style="margin-top:12px"><div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase">Notes</div>${esc(d.notes)}</div>`:''}
    </div>
    <div class="mf">
      ${(d.status==='pending'||d.status==='assigned'||d.status==='transit')?`<button class="mini r" onclick="adminCancelDelivery(${d.id})">Cancel delivery</button>`:''}
      ${(d.status==='assigned'||d.status==='transit')?`<button class="mini g" onclick="adminDeliver(${d.id})">Mark delivered</button>`:''}
      <button class="btn outline" onclick="closeModal()">Close</button>
    </div>`);
}
async function adminCancelDelivery(id){
  if(!confirm('Cancel this delivery? It will be marked cancelled and unassigned.'))return;
  const {error}=await sb.from('deliveries').update({status:'cancelled',captain_id:null}).eq('id',id);
  if(error){toast(error.message);return;}
  closeModal(); await loadAll(); render(); toast('Delivery cancelled');
}
async function adminDeliver(id){
  const d=deliveries.find(x=>x.id===id); if(!d)return;
  if(!confirm('Mark this delivery as delivered?\n\nThis credits the captain’s earnings (and adds the COD commission if cash).'))return;
  const {error}=await sb.from('deliveries').update({status:'delivered'}).eq('id',id);
  if(error){toast(error.message);return;}
  // credit the captain, mirroring what the app does on delivery
  if(d.captain_id){
    const price=Number(d.price||0);
    const comm=Math.round(price*0.5*100)/100, net=Math.round((price-comm)*100)/100;
    const {data:cap}=await sb.from('captains').select('earnings,owed').eq('id',d.captain_id).single();
    if(cap){
      const upd={earnings:Math.round((Number(cap.earnings||0)+net)*100)/100};
      if((d.payment_method||'cod')==='cod') upd.owed=Math.round((Number(cap.owed||0)+comm)*100)/100;
      await sb.from('captains').update(upd).eq('id',d.captain_id);
    }
  }
  closeModal(); await loadAll(); render(); toast('Marked as delivered'+(d.captain_id?' · captain credited':''));
}

/* ---------- REPORTS ---------- */
let rpFrom='', rpTo='', rpPreset='all';
function dstr(d){ return new Date(d).toISOString().slice(0,10); }
function applyPreset(p){
  rpPreset=p; const today=new Date();
  const iso=d=>d.toISOString().slice(0,10);
  if(p==='today'){ rpFrom=rpTo=iso(today); }
  else if(p==='7'){ const s=new Date(today); s.setDate(s.getDate()-6); rpFrom=iso(s); rpTo=iso(today); }
  else if(p==='30'){ const s=new Date(today); s.setDate(s.getDate()-29); rpFrom=iso(s); rpTo=iso(today); }
  else if(p==='month'){ rpFrom=iso(new Date(today.getFullYear(),today.getMonth(),1)); rpTo=iso(today); }
  else { rpFrom=''; rpTo=''; }   // all time
  render();
}
function inRange(ts){
  if(!ts) return false;
  const d=dstr(ts);
  if(rpFrom && d<rpFrom) return false;
  if(rpTo && d>rpTo) return false;
  return true;
}
function rpData(){
  const dels=deliveries.filter(d=>inRange(d.created_at));
  const caps=captains.filter(c=>inRange(c.joined));
  const custs=customers.filter(c=>inRange(c.created_at));
  const delivered=dels.filter(d=>d.status==='delivered');
  const revenue=delivered.reduce((s,d)=>s+Number(d.price||0),0);
  const commission=revenue*0.5;
  return {dels,caps,custs,delivered,revenue,commission,
    cancelled:dels.filter(d=>d.status==='cancelled').length,
    active:dels.filter(d=>['pending','assigned','transit'].includes(d.status)).length};
}
let rpTab='overall';
function rpGo(t){ rpTab=t; render(); }
const kpiCard=(l,v,d)=>`<div class="kpi"><div class="l">${l}</div><div class="v">${v}</div>${d?`<div style="font-size:12px;color:var(--muted);margin-top:2px">${d}</div>`:''}</div>`;
function viewReports(){
  const label = (!rpFrom&&!rpTo) ? 'All time' : `${rpFrom||'…'} → ${rpTo||'…'}`;
  const presetBtn=(k,t)=>`<button class="mini ${rpPreset===k?'b':''}" style="${rpPreset===k?'border-color:var(--brand);background:var(--brand-soft);color:var(--brand-dark)':''}" onclick="applyPreset('${k}')">${t}</button>`;
  const tabs=[['overall','▤ Overall'],['captains','🚗 Captains'],['deliveries','📦 Deliveries'],['customers','🙂 Customers'],['financial','💰 Financial']];
  const tabBar=`<div style="display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:18px;padding-bottom:0">
    ${tabs.map(([k,t])=>`<button onclick="rpGo('${k}')" style="border:none;background:none;cursor:pointer;padding:10px 14px;font-weight:700;font-size:13.5px;
      color:${rpTab===k?'var(--brand)':'var(--muted)'};border-bottom:3px solid ${rpTab===k?'var(--brand)':'transparent'}">${t}</button>`).join('')}</div>`;
  const filters=`<div class="card">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
        ${presetBtn('all','All time')}${presetBtn('today','Today')}${presetBtn('7','Last 7 days')}${presetBtn('30','Last 30 days')}${presetBtn('month','This month')}
      </div>
      <div class="two">
        <div><label>From</label><input type="date" value="${rpFrom}" onchange="rpFrom=this.value;rpPreset='custom';render()"></div>
        <div><label>To</label><input type="date" value="${rpTo}" onchange="rpTo=this.value;rpPreset='custom';render()"></div>
      </div>
    </div>`;
  let body='';
  if(rpTab==='overall') body=rpOverall();
  else if(rpTab==='captains') body=rpCaptains();
  else if(rpTab==='deliveries') body=rpDeliveries();
  else if(rpTab==='customers') body=rpCustomers();
  else body=rpFinancial();
  return `<div class="head"><div><h1>Reports</h1><div class="sub">${label}</div></div>
    <button class="btn sm outline" onclick="reload()">↻ Refresh</button></div>

function dailyPanel(r){
  const byDay={};
  r.dels.forEach(d=>{ const k=dstr(d.created_at); byDay[k]=byDay[k]||{n:0,rev:0,done:0};
    byDay[k].n++; if(d.status==='delivered'){byDay[k].done++; byDay[k].rev+=Number(d.price||0);} });
  const rows=Object.keys(byDay).sort().reverse().map(k=>
    `<tr><td>${k}</td><td>${byDay[k].n}</td><td>${byDay[k].done}</td><td>${jod(byDay[k].rev)}</td></tr>`).join('')
    || `<tr><td class="empty" colspan="4">No deliveries in this period</td></tr>`;

function rpFinancial(){

function csvCell(v){ const s=(v==null?'':String(v)).replace(/"/g,'""'); return `"${s}"`; }
function downloadCsv(name,rows){
  const csv=rows.map(r=>r.map(csvCell).join(',')).join('\r\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=name+'_'+(rpFrom||'all')+'_'+(rpTo||'all')+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('CSV downloaded');
}
function exportCsv(kind){
  const r=rpData();
  if(kind==='deliveries'){
    const rows=[['ID','Created','Customer','Recipients','From city','To city','Pickup address','Captain','Price (JOD)','Payment','Status','Discount']];
    r.dels.forEach(d=>{
      const recips=((d.delivery_bags||[]).map(b=>b.recipient).filter(Boolean)).join(' | ');
      const cap=d.captains&&d.captains.profiles?d.captains.profiles.full_name:'';
      rows.push([d.id, dstr(d.created_at), d.customer?d.customer.full_name:'', recips, d.from_city, d.to_city,
        d.pickup_addr||'', cap, Number(d.price||0), d.payment_method||'', d.status, d.discount_code||'']);
    });
    downloadCsv('deliveries',rows);
  } else if(kind==='captains'){
    const rows=[['Name','Email','Mobile','City','Vehicle','Plate','Status','Earnings (JOD)','Owed (JOD)','Joined']];
    r.caps.forEach(c=>rows.push([c.name,c.email,c.mobile,c.city,c.vehicle,c.plate||'',c.status,c.earnings,c.owed,c.joined?dstr(c.joined):'']));
    downloadCsv('captains',rows);
  } else if(kind==='customers'){
    const rows=[['Name','Email','Mobile','City','Joined']];
    r.custs.forEach(c=>rows.push([c.full_name,c.email,c.mobile||'',c.city||'',c.created_at?dstr(c.created_at):'']));
    downloadCsv('customers',rows);
  } else {
    const byDay={};
    r.dels.forEach(d=>{ const k=dstr(d.created_at); byDay[k]=byDay[k]||{n:0,done:0,rev:0};
      byDay[k].n++; if(d.status==='delivered'){byDay[k].done++; byDay[k].rev+=Number(d.price||0);} });
    const rows=[['Date','Orders','Delivered','Revenue (JOD)','Droply share (JOD)']];
    Object.keys(byDay).sort().forEach(k=>rows.push([k,byDay[k].n,byDay[k].done,byDay[k].rev,byDay[k].rev*0.5]));
    downloadCsv('daily_summary',rows);
  }
}

      </div>
      <label>Title</label><input id="an_title" placeholder="e.g. Holiday hours">
      <label>Message</label><textarea id="an_msg" rows="4" placeholder="Write your announcement…"></textarea>
      <div style="height:14px"></div>
      <button class="btn full" onclick="sendAnnounce()">Send announcement</button>
      <div class="hint" style="margin-top:12px">This inserts a notification for every ${anAud==='all'?'user':anAud.slice(0,-1)} and appears in their app instantly.</div>
    </div>`;
}
async function sendAnnounce(){
  const title=($('an_title').value||'').trim(), msg=($('an_msg').value||'').trim();
  if(!title){toast('Enter a title');return;} if(!msg){toast('Enter a message');return;}
  const {data,error}=await sb.rpc('broadcast_announcement',{p_audience:anAud,p_title:title,p_body:msg});
  if(error){toast(error.message);return;}
  $('an_title').value='';$('an_msg').value='';
  toast('Sent to '+(data||0)+' user'+(data===1?'':'s'));
}

/* ---------- MODALS ---------- */
function openModal(html){ $('modal').innerHTML=html; $('overlay').classList.add('show'); }
function closeModal(){ $('overlay').classList.remove('show'); }
$('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeModal(); });
function fieldRow(id,label,val,type){return `<label>${label}</label><input id="${id}" type="${type||'text'}" value="${esc(val||'')}">`;}
function citySelect(id,val){return `<label>City</label><select id="${id}">${CITIES.map(c=>`<option ${val===c?'selected':''}>${c}</option>`).join('')}</select>`;}

/* ---------- VIEW CAPTAIN (details + KYC documents) ---------- */
function viewCaptain(id){
  const c=captains.find(x=>x.id===id); if(!c)return;
  const row=(k,v)=>`<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line)">
    <span style="color:var(--muted)">${k}</span><b>${esc(v||'—')}</b></div>`;
  const docTile=(key,icon,label)=>{
    const p=c.docs&&c.docs[key];
    return `<div class="kpi" style="text-align:center;padding:14px">
      <div style="font-size:30px">${icon}</div>
      <div style="font-weight:700;font-size:12.5px;margin-top:4px">${label}</div>
      ${p?`<button class="mini b" style="margin-top:8px" onclick="openDoc('${esc(p)}')">Open</button>`
         :`<div style="font-size:11.5px;color:var(--muted);margin-top:8px">Not uploaded</div>`}</div>`;
  };
  openModal(`<div class="mh"><h3>${esc(c.name)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      <div style="margin-bottom:6px">${c.status==='verified'?'<span class="pill p-verified">Verified</span>':c.status==='pending'?'<span class="pill p-pending">Pending</span>':'<span class="pill p-suspended">Suspended</span>'}</div>
      ${row('Email',c.email)}${row('Mobile',c.mobile)}${row('City',c.city)}
      ${row('Vehicle',c.vehicle)}${row('Plate',c.plate)}
      ${row('Earnings',jod(c.earnings))}${row('Owed to Droply',jod(c.owed))}
      ${row('Joined',c.joined?new Date(c.joined).toISOString().slice(0,10):'—')}
      <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;margin:16px 0 8px">Verification documents</div>
      <div class="kpis" style="grid-template-columns:repeat(3,1fr);margin:0">
        ${docTile('id','🪪','Government ID')}
        ${docTile('license','🚗','Driving license')}
        ${docTile('record','📄','No-criminal record')}
      </div>
    </div>
    <div class="mf">
      ${c.status==='pending'?`<button class="mini g" onclick="setCaptain('${c.id}','verified');closeModal()">Approve</button>
        <button class="mini r" onclick="setCaptain('${c.id}','suspended');closeModal()">Reject</button>`:''}
      <button class="btn outline" onclick="closeModal()">Close</button>
    </div>`);
}
// create a temporary signed link for a private KYC file and open it
async function openDoc(path){
  if(!path){toast('No file');return;}
  if(/^https?:\/\//.test(path)){ window.open(path,'_blank'); return; }
  const {data,error}=await sb.storage.from('kyc').createSignedUrl(path,300);
  if(error||!data){ toast('Could not open file — it may have been uploaded before storage was enabled.'); return; }
  window.open(data.signedUrl,'_blank');
}

function openCaptain(id){
  const c=captains.find(x=>x.id===id); if(!c)return;
  const parts=(c.name||'').split(' '); const fn=parts.shift()||''; const ln=parts.join(' ');
  openModal(`<div class="mh"><h3>Edit captain</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      <div class="two"><div>${fieldRow('e_fn','First name',fn)}</div><div>${fieldRow('e_ln','Last name',ln)}</div></div>
      ${fieldRow('e_mobile','Mobile',c.mobile)}
      <div class="two"><div>${citySelect('e_city',c.city)}</div>
        <div><label>Vehicle</label><select id="e_veh"><option ${c.vehicle==='Car'?'selected':''}>Car</option><option ${c.vehicle==='Motorcycle'?'selected':''}>Motorcycle</option></select></div></div>
      <div class="two"><div>${fieldRow('e_plate','Plate',c.plate)}</div>
        <div><label>Status</label><select id="e_status">${['pending','verified','suspended'].map(s=>`<option ${c.status===s?'selected':''}>${s}</option>`).join('')}</select></div></div>
      <label>New password (optional)</label><input id="e_pass" type="password" placeholder="Leave blank to keep current">
      <div style="font-size:12px;color:var(--muted);margin-top:4px">Sets a new login password for this captain. Requires the admin-set-password function.</div>
    </div>
    <div class="mf"><button class="btn outline" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveCaptain('${id}')">Save</button></div>`);
}
async function setUserPassword(id,pass){
  if(!pass) return true;
  const {data,error}=await sb.functions.invoke('admin-set-password',{body:{user_id:id,password:pass}});
  if(error){ toast('Password change failed — is the admin-set-password function deployed?'); return false; }
  if(data&&data.error){ toast(data.error); return false; }
  return true;
}
async function saveCaptain(id){
  const name=($('e_fn').value+' '+$('e_ln').value).trim();
  const {error:e1}=await sb.from('profiles').update({full_name:name,mobile:$('e_mobile').value.trim(),city:$('e_city').value}).eq('id',id);
  const {error:e2}=await sb.from('captains').update({vehicle:$('e_veh').value,plate:$('e_plate').value.trim(),status:$('e_status').value}).eq('id',id);
  if(e1||e2){toast((e1||e2).message);return;}
  const pass=($('e_pass').value||'').trim();
  if(pass){ if(pass.length<6){toast('Password must be 6+ characters');return;} if(!await setUserPassword(id,pass))return; }
  closeModal(); await loadAll(); render(); toast('Captain updated'+(pass?' · password changed':''));
}

async function toggleCustomerSuspend(id,suspend){
  if(suspend && !confirm('Suspend this customer? They will not be able to use the app.'))return;
  const {error}=await sb.from('profiles').update({suspended:suspend}).eq('id',id);
  if(error){toast(error.message+' — did you run suspend.sql?');return;}
  await loadAll(); render(); toast(suspend?'Customer suspended':'Customer reactivated');
}

    <div class="mb">
      ${fieldRow('n_name','Full name','')}
      <div class="two"><div>${fieldRow('n_email','Email','','email')}</div><div>${fieldRow('n_mobile','Mobile','')}</div></div>
      <div class="two"><div>${citySelect('n_city','Amman')}</div>
        <div><label>Vehicle</label><select id="n_veh"><option>Car</option><option>Motorcycle</option></select></div></div>
      <div class="two"><div>${fieldRow('n_plate','Plate','')}</div><div>${fieldRow('n_pass','Temp password','','password')}</div></div>

    </div>
    <div class="mf"><button class="btn outline" onclick="closeModal()">Cancel</button><button class="btn" onclick="addCaptain()">Create captain</button></div>`);
}
async function addCaptain(){
  const body={role:'captain',full_name:$('n_name').value.trim(),email:$('n_email').value.trim(),password:$('n_pass').value,
    mobile:$('n_mobile').value.trim(),city:$('n_city').value,vehicle:$('n_veh').value,plate:$('n_plate').value.trim()};

/* ---------- TEAM ---------- */
function viewTeam(){
  const meEmail=$('whoami').textContent;
  const rows=staff.map(s=>{
    const me=s.email===meEmail;
    return `<tr>
    <td><div class="u"><div class="nm">${esc(s.full_name)}${me?'<span class="you">You</span>':''}</div><div class="em">${esc(s.email)}</div></div></td>
    <td><span class="pill p-role">${STAFF_ROLES[s.staff_role]||'Admin'}</span></td>
    <td>${s.suspended?'<span class="pill p-suspended">Suspended</span>':'<span class="pill p-verified">Active</span>'}</td>
    <td>${s.created_at?new Date(s.created_at).toISOString().slice(0,10):'—'}</td>
    <td>
      <button class="mini b" onclick="openStaff('${s.id}')">Edit role</button>
      ${me?'':`<button class="mini ${s.suspended?'g':'r'}" onclick="toggleStaffSuspend('${s.id}',${!s.suspended})">${s.suspended?'Unsuspend':'Suspend'}</button>
      <button class="mini r" onclick="removeStaff('${s.id}')">Remove</button>`}
    </td></tr>`;}).join('')
    || `<tr><td class="empty" colspan="5">No team members.</td></tr>`;
  return `<div class="head"><div><h1>Team</h1><div class="sub">${staff.length} admin/staff members</div></div>
    <div style="display:flex;gap:8px"><button class="btn sm outline" onclick="reload()">↻ Refresh</button><button class="btn sm" onclick="openNewStaff()">＋ Add member</button></div></div>
    <div class="panel" style="margin-bottom:18px"><table><thead><tr><th>Member</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
async function toggleStaffSuspend(id,suspend){
  const {error}=await sb.from('profiles').update({suspended:suspend}).eq('id',id);
  if(error){toast(error.message+' — did you run suspend.sql?');return;}
  await loadAll(); render(); toast(suspend?'Member suspended':'Member reactivated');
}
async function removeStaff(id){
  const s=staff.find(x=>x.id===id); if(!s)return;
  if(!confirm('Remove '+s.full_name+' from the team?\n\nThey will lose admin access immediately.'))return;
  const {error}=await sb.from('profiles').delete().eq('id',id);
  if(error){toast(error.message);return;}
  await loadAll(); render(); toast('Member removed');
}
function openStaff(id){
  const s=staff.find(x=>x.id===id); if(!s)return;
  openModal(`<div class="mh"><h3>Edit ${esc(s.full_name)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb"><label>Role</label><select id="s_role">${Object.entries(STAFF_ROLES).map(([k,v])=>`<option value="${k}" ${s.staff_role===k?'selected':''}>${v}</option>`).join('')}</select></div>
    <div class="mf"><button class="btn outline" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveStaff('${id}')">Save</button></div>`);
}
async function saveStaff(id){
  const {error}=await sb.from('profiles').update({staff_role:$('s_role').value}).eq('id',id);
  if(error){toast(error.message);return;}
  closeModal(); await loadAll(); render(); toast('Role updated');
}
function openNewStaff(){
  openModal(`<div class="mh"><h3>Add team member</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="mb">
      ${fieldRow('t_name','Full name','')}
      <div class="two"><div>${fieldRow('t_email','Email','','email')}</div><div>${fieldRow('t_pass','Temp password','','password')}</div></div>
      <label>Role</label><select id="t_role">${Object.entries(STAFF_ROLES).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select>
      <div style="font-size:12px;color:var(--muted);margin-top:10px">Creates a staff login with admin access. Requires the admin-create-user function to be deployed.</div>
    </div>
    <div class="mf"><button class="btn outline" onclick="closeModal()">Cancel</button><button class="btn" onclick="addStaff()">Create member</button></div>`);
}
async function addStaff(){
  const body={role:'admin',full_name:$('t_name').value.trim(),email:$('t_email').value.trim(),password:$('t_pass').value,staff_role:$('t_role').value};
  if(!body.full_name||!body.email||!body.password){toast('Fill name, email and password');return;}
  await createUser(body,'Team member added');
}

async function createUser(body,okMsg){
  toast('Creating…');
  const {data,error}=await sb.functions.invoke('admin-create-user',{body});
  if(error){ toast('Failed — is the admin-create-user function deployed?'); return; }
  if(data&&data.error){ toast(data.error); return; }
  closeModal(); await loadAll(); render(); toast(okMsg);
}

async function reload(){ await loadAll(); render(); toast('Refreshed'); }
boot();
</script>
